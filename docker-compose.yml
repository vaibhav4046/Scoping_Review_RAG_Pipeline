services:
  # ── PostgreSQL + pgvector ──────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scopingreview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scopingreview_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-scoping_review_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scopingreview}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - scopenet

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - scopenet

  # ── Ollama (Local LLM) ────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - scopenet

  # ── FastAPI Backend ────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --log-level ${LOG_LEVEL:-info}
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scopenet

  # ── Celery Worker ──────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.core.celery_app worker
      --loglevel=${LOG_LEVEL:-info}
      --concurrency=4
      -Q default,search,screening,extraction,validation
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scopenet

  # ── Celery Beat (Scheduler) ───────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.core.celery_app beat
      --loglevel=${LOG_LEVEL:-info}
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scopenet

  # ── Flower (Celery Monitoring) ─────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      celery -A app.core.celery_app flower
      --port=5555
      --broker_api=redis://redis:6379/0
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scopenet

  # ── Next.js Frontend ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - scopenet

volumes:
  pgdata:
  redisdata:
  ollama_models:
  upload_data:

networks:
  scopenet:
    driver: bridge
